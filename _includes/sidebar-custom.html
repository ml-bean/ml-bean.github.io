<nav class="nav__list">
  <h3 class="nav__title" style="padding-left: 0;">Categories</h3>
  <ul class="nav__items" style="list-style: none; padding: 0; margin: 0;">
    {% assign categories_sorted = site.categories | sort %}
    {% for category in categories_sorted %}
      {% assign cat_slug = category[0] | slugify %}
      <li>
        <a href="/categories/#{{ cat_slug }}"
           style="display: flex; justify-content: space-between; align-items: baseline; gap: 0.5em;"
           {% if page.categories contains category[0] %}class="active"{% endif %}>
          <span>{{ category[0] }}</span>
          <span style="opacity: 0.6; font-size: 0.85em;">{{ category[1].size }}</span>
        </a>
      </li>
    {% endfor %}
  </ul>
</nav>
