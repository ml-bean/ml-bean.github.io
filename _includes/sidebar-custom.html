<nav class="nav__list">
  <h3 class="nav__title" style="padding-left: 0;">Categories</h3>
  <ul class="nav__items">
    {% assign categories_sorted = site.categories | sort %}
    {% for category in categories_sorted %}
      {% assign cat_slug = category[0] | slugify %}
      <li>
        <a href="/categories/#{{ cat_slug }}"
           {% if page.categories contains category[0] %}class="active"{% endif %}>
          {{ category[0] }}
          <span style="float: right; opacity: 0.6; font-size: 0.85em;">({{ category[1].size }})</span>
        </a>
      </li>
    {% endfor %}
  </ul>
</nav>
